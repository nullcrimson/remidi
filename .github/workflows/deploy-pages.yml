name: Deploy app to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust (wasm target)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      - name: Read pinned wasm-bindgen version
        id: wb
        run: |
          ver=$(grep -A1 '^name = "wasm-bindgen"$' Cargo.lock | grep '^version' | head -1 | sed -E 's/version = "(.+)"/\1/')
          echo "wasm-bindgen version: $ver"
          echo "v=$ver" >> "$GITHUB_OUTPUT"

      - name: Install wasm-bindgen-cli (matching Cargo.lock)
        uses: taiki-e/install-action@v2
        with:
          tool: wasm-bindgen-cli@${{ steps.wb.outputs.v }}

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install deps
        working-directory: app
        run: npm ci

      - name: Build (wasm + vite)
        working-directory: app
        env:
          VITE_BASE: "/${{ github.event.repository.name }}/"
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: app/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

      - name: Notify IndexNow
        run: |
          curl -sS -o /dev/null -w "IndexNow: %{http_code}\n" \
            "https://api.indexnow.org/indexnow?url=https://nullcrimson.github.io/remidi/&key=b70482caafc9bdd6b2cc45b7fd07ddae&keyLocation=https://nullcrimson.github.io/remidi/b70482caafc9bdd6b2cc45b7fd07ddae.txt"
