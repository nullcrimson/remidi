id = "addictive_drums2"
name = "Addictive Drums 2 (native)"
# AD2's DEFAULT/native trigger layout — NOT General MIDI. Only Kick (36) and
# Snare center (38) coincide with GM; everything else is AD2-specific.
# Source: XLN Audio official "Addictive Drums 2 – Keymap" PDF (v02).
# Notes:
#  - `primary = true` is the note used when writing TO this engine (reverse).
#  - AD2 has no fixed native China/Splash note (they ride on generic Cymbal
#    slots), so those canonical slots are reached via fallback to CrashMain.
#  - AD2 closed-hat shank/bell and the 2nd closed pair collapse to HatClosed;
#    the 4 open levels A-D collapse onto our 3 (HatOpen1..3).
notes = [
  # Kick
  { note = 36, canon = "KickMain", primary = true },

  # Snare
  { note = 38, canon = "SnareCenter", primary = true },
  { note = 39, canon = "SnareCenter" },          # open hit (dbl)
  { note = 40, canon = "SnareCenter" },          # open lateral (dbl)
  { note = 43, canon = "SnareCenter" },          # shallow hit
  { note = 37, canon = "SnareRim", primary = true },
  { note = 41, canon = "SnareRim" },             # shallow rimshot
  { note = 42, canon = "SnareSidestick", primary = true },
  { note = 44, canon = "SnareSidestick" },       # rimclick

  # Hi-hat
  { note = 48, canon = "HatPedal", primary = true },
  { note = 59, canon = "HatPedal" },             # foot open / splash
  { note = 49, canon = "HatClosed", primary = true },  # closed1 tip
  { note = 50, canon = "HatClosed" },            # closed1 shank
  { note = 51, canon = "HatClosed" },            # closed2 tip
  { note = 52, canon = "HatClosed" },            # closed2 shank
  { note = 53, canon = "HatClosed" },            # closed bell
  { note = 54, canon = "HatOpen1", primary = true },   # open A (tightest)
  { note = 55, canon = "HatOpen2", primary = true },   # open B
  { note = 56, canon = "HatOpen3", primary = true },   # open C
  { note = 57, canon = "HatOpen3" },             # open D (most open)
  { note = 58, canon = "HatOpen3" },             # open bell

  # Toms (high -> low; AD2 4-tom layout = 2 rack + 2 floor)
  { note = 71, canon = "TomR1", primary = true },
  { note = 72, canon = "TomR1" },                # rimshot
  { note = 69, canon = "TomR2", primary = true },
  { note = 70, canon = "TomR2" },
  { note = 67, canon = "TomF1", primary = true },
  { note = 68, canon = "TomF1" },
  { note = 65, canon = "TomF2", primary = true },
  { note = 66, canon = "TomF2" },

  # Ride
  { note = 60, canon = "Ride", primary = true }, # tip / bow
  { note = 45, canon = "Ride" },                 # tip (dbl)
  { note = 61, canon = "RideBell", primary = true },
  { note = 62, canon = "RideEdge", primary = true },  # shaft / edge
  { note = 63, canon = "RideEdge" },             # choke

  # Cymbals / crashes (AD2 "Cymbal 1-6")
  { note = 77, canon = "CrashMain", primary = true },
  { note = 46, canon = "CrashMain" },            # cymbal1 (dbl)
  { note = 79, canon = "CrashWide", primary = true },
  { note = 81, canon = "CrashWide" },            # cymbal3
  { note = 78, canon = "CrashChoke", primary = true },
  { note = 80, canon = "CrashChoke" },
  { note = 82, canon = "CrashChoke" },
]
