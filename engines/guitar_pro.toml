id = "guitar_pro"
name = "Guitar Pro (drums)"
# Guitar Pro plays/exports drum tracks as STANDARD General MIDI percussion
# (channel 10) — note numbers are identical to GM. Verified against alphaTab's
# PercussionMapper (the reference GP-format parser): rim shot, half-open hat,
# ride edge, and cymbal chokes are distinct GP *articulations* but collapse onto
# the base GM note, so there are no extra note numbers to map.
# GP labels 35 as the primary "Kick (hit)" and 36 as "Kick 2".
notes = [
  # Kick
  { note = 36, canon = "KickMain", primary = true },
  { note = 35, canon = "KickAlt", primary = true },

  # Snare (rim shot also plays 38; side stick 37)
  { note = 38, canon = "SnareCenter", primary = true },
  { note = 40, canon = "SnareCenter" },
  { note = 37, canon = "SnareSidestick", primary = true },

  # Hi-hat (half-open also plays 46)
  { note = 42, canon = "HatClosed", primary = true },
  { note = 44, canon = "HatPedal", primary = true },
  { note = 46, canon = "HatOpen1", primary = true },

  # Toms (high -> low)
  { note = 50, canon = "TomR1", primary = true },
  { note = 48, canon = "TomR2", primary = true },
  { note = 47, canon = "TomR3", primary = true },
  { note = 45, canon = "TomF1", primary = true },
  { note = 43, canon = "TomF2", primary = true },
  { note = 41, canon = "TomF3", primary = true },

  # Cymbals (chokes/edge collapse onto these base notes)
  { note = 49, canon = "CrashMain", primary = true },
  { note = 57, canon = "CrashWide", primary = true },
  { note = 51, canon = "Ride", primary = true },
  { note = 53, canon = "RideBell", primary = true },
  { note = 59, canon = "RideEdge", primary = true },
  { note = 52, canon = "China", primary = true },
  { note = 55, canon = "Splash", primary = true },
]
