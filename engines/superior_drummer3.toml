id = "superior_drummer3"
name = "Superior Drummer 3 (Toontrack default)"
# SD3's default map is GM-compatible in the 33-59 core, with a large native
# articulation set in 60-127. Primaries (the reverse/encode direction) use the
# GM-core notes so a converted groove plays on a standard SD3 kit; the native
# notes are added as decode aliases so SD3-authored MIDI converts out well.
# Caveats:
#  - SD3 cymbals are generic "Cy 1-5" slots; the physical china/splash/stack is
#    kit-dependent, so this map has no native china/splash note. Those canonical
#    slots reach SD3 via fallback (China/Splash/Stack -> CrashMain).
#  - SD3 reassigns GM 50/52/54/55/56/58 to cymbal crashes/mutes (NOT tom/china/
#    splash), so they are decoded as crash / CrashChoke here, not their GM sense.
#  - Source: SD3 default pitchlist + GM->SD3 remap tables. Extended-region exacts
#    (open-hat level ordinals) are best-effort, pending in-app confirmation.
notes = [
  # Kick
  { note = 36, canon = "KickMain", primary = true },
  { note = 35, canon = "KickAlt", primary = true },
  { note = 34, canon = "KickAlt" },

  # Snare (SD3 has true rimshot/ruff/flam articulations)
  { note = 38, canon = "SnareCenter", primary = true },
  { note = 125, canon = "SnareCenter" },          # Mid Center
  { note = 40, canon = "SnareRim", primary = true },   # Rimshot
  { note = 71, canon = "SnareRim" },              # Rim Only
  { note = 37, canon = "SnareSidestick", primary = true },
  { note = 39, canon = "SnareRuff", primary = true },
  { note = 69, canon = "SnareFlam", primary = true },

